    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #f0f0f0; overflow: hidden; }
      #root { height: 100%; display: flex; justify-content: center; align-items: flex-start; }
      .app-shell { height: 100dvh; padding-top: env(safe-area-inset-top, 0px); }
    </style>
    <!-- 카카오 SDK보다 먼저 실행: hash 보존 + 카카오 공유 쿼리 파라미터(?p=) 처리 -->
    <script>
      // 카카오 공유 링크는 ?p=item/{id} 쿼리 파라미터로 들어옴 (HTTP 리다이렉트 시 hash 소실 우회)
      var qm = window.location.search.match(/[?&]p=(item|job)\/([^&]+)/);
      if (qm) {
        var nh = '#/' + qm[1] + '/' + qm[2];
        window.__entryHash = nh;
        window.history.replaceState(null, '', window.location.pathname + nh);
      } else {
        window.__entryHash = window.location.hash;
      }
      console.log('[공쓰재] __entryHash captured:', window.__entryHash, '| from:', qm ? '?p= query' : 'hash');
    </script>
    <!-- hashchange 감시 -->
    <script>window.addEventListener('hashchange', function(e){ console.warn('[공쓰재] hashchange! old:', e.oldURL.split('#')[1]||'(empty)', '→ new:', window.location.hash||'(empty)'); console.trace('[공쓰재] hashchange caller'); });</script>
    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9c3090415c027e63579160554b84854d&libraries=services,geocoder"></script>
