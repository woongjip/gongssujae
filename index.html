    <!-- 카카오 SDK보다 먼저 실행: hash를 보존. SDK가 hash를 지우기 전에 캡처. -->
    <script>window.__entryHash = window.location.hash; console.log('[공쓰재] __entryHash captured:', window.__entryHash);</script>
    <!-- hashchange 감시: 누가 hash를 지우는지 추적 -->
    <script>window.addEventListener('hashchange', function(e){ console.warn('[공쓰재] hashchange! old:', e.oldURL.split('#')[1]||'(empty)', '→ new:', window.location.hash||'(empty)'); console.trace('[공쓰재] hashchange caller'); });</script>
